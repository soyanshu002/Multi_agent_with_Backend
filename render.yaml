services:
  # -------------------------
  # 1. PostgreSQL Database
  # -------------------------
  - type: psql
    name: multi-agent-db
    plan: free
    region: oregon
    # This ensures the DB is only accessible to your internal Render apps, adding a good layer of security.

  # -------------------------
  # 2. Redis Instance
  # -------------------------
  - type: redis
    name: multi-agent-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru

  # -------------------------
  # 3. Backend (FastAPI)
  # -------------------------
  - type: web
    name: multi-agent-backend
    env: docker
    plan: free
    region: oregon
    rootDir: ./backend  # Uses the Dockerfile inside the backend folder
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health # Checks your FastAPI health endpoint
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: multi-agent-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: multi-agent-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render will automatically create a secure random string!
      - key: PORT
        value: 8000
      # The following must be provided by you manually the first time in the Render dashboard:
      - key: GROQ_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: PINECONE_ENVIRONMENT
        sync: false

  # -------------------------
  # 4. Frontend (Streamlit)
  # -------------------------
  - type: web
    name: multi-agent-frontend
    env: docker
    plan: free
    region: oregon
    rootDir: ./frontend # Uses the Dockerfile inside the frontend folder
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8501
      # Note: Render will assign a random URL to the backend.
      # You need to fill this out manually in the Dashboard's Environment tab 
      # with the backend's provided Render URL (e.g., https://multi-agent-backend-xxx.onrender.com).
      - key: BACKEND_URL
        sync: false
