databases:
  - name: multi-agent-db
    plan: free
    region: oregon
    ipAllowList: []

services:
  # -------------------------
  # 1. Redis Instance
  # -------------------------
  - type: redis
    name: multi-agent-redis
    plan: free
    region: oregon
    ipAllowList: []

  # -------------------------
  # 2. Backend (FastAPI)
  # -------------------------
  - type: web
    name: multi-agent-backend
    env: docker
    plan: free
    region: oregon
    rootDir: ./backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: multi-agent-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: multi-agent-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: PINECONE_ENVIRONMENT
        sync: false

  # -------------------------
  # 3. Frontend (Streamlit)
  # -------------------------
  - type: web
    name: multi-agent-frontend
    env: docker
    plan: free
    region: oregon
    rootDir: ./frontend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8501
      - key: BACKEND_URL
        sync: false
