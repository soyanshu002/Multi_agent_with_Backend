<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smruti AgentX - Authentication</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .brand-mark {
      position: relative;
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 0.95rem;
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 45%, #f59e0b 100%);
      box-shadow: 0 12px 30px rgba(15, 118, 110, 0.28);
      transition: transform 180ms ease, box-shadow 180ms ease;
      overflow: hidden;
    }

    .brand-mark::before {
      content: '';
      position: absolute;
      inset: 0.38rem;
      border-radius: 0.72rem;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(4px);
    }

    .brand-mark::after {
      content: '';
      position: absolute;
      width: 0.42rem;
      height: 0.42rem;
      border-radius: 999px;
      right: 0.3rem;
      top: 0.3rem;
      background: #fff;
      animation: pulse-dot 2s infinite;
    }

    .brand-mark:hover {
      transform: translateY(-1px) rotate(-4deg) scale(1.02);
      box-shadow: 0 14px 36px rgba(15, 118, 110, 0.34);
    }

    .brand-mark i {
      position: relative;
      z-index: 1;
      animation: float-icon 2.8s ease-in-out infinite;
    }

    .brand-spin {
      animation: brand-spin 14s linear infinite;
    }

    @keyframes brand-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes float-icon {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-1px) scale(1.03); }
    }

    @keyframes pulse-dot {
      0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.42); }
      70% { box-shadow: 0 0 0 8px rgba(255, 255, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
    }

    body {
      font-family: 'Sora', sans-serif;
      background: radial-gradient(circle at 10% 10%, #d9f7f2 0%, transparent 35%),
                  radial-gradient(circle at 90% 20%, #fff1db 0%, transparent 28%),
                  #eef3f7;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-4xl grid md:grid-cols-2 gap-4">
    <section class="rounded-2xl bg-slate-900 text-slate-100 p-8 shadow-xl">
      <div class="flex items-center gap-3">
        <div class="brand-mark brand-spin flex items-center justify-center text-white"><i data-lucide="sparkles" class="w-5 h-5"></i></div>
        <div>
          <h1 class="text-xl font-semibold">Smruti AgentX</h1>
          <p class="text-xs text-slate-400">Unified AI Chatbot Platform</p>
        </div>
      </div>
      <div class="mt-8 space-y-4 text-sm text-slate-300">
        <div class="rounded-lg border border-slate-700 p-3">Basic Chat for general requests</div>
        <div class="rounded-lg border border-slate-700 p-3">Document QA with Pinecone-backed retrieval</div>
        <div class="rounded-lg border border-slate-700 p-3">Audio STT/TTS workflows</div>
      </div>
      <p class="mt-8 text-xs text-slate-500">Use your account to access chat, upload docs, and test all usecases.</p>
    </section>

    <section class="rounded-2xl bg-white border border-slate-200 p-6 shadow-lg">
      <div class="flex gap-2 mb-4">
        <button id="tabLogin" class="px-3 py-2 rounded-lg text-sm font-semibold bg-slate-900 text-white">Login</button>
        <button id="tabSignup" class="px-3 py-2 rounded-lg text-sm font-semibold bg-slate-100 text-slate-700">Sign Up</button>
      </div>

      <div id="loginPanel" class="space-y-3">
        <div>
          <label class="text-xs text-slate-500">Email</label>
          <input id="loginEmail" type="email" class="w-full mt-1 rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="you@example.com" />
        </div>
        <div>
          <label class="text-xs text-slate-500">Password</label>
          <input id="loginPassword" type="password" class="w-full mt-1 rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="••••••••" />
        </div>
        <button id="loginBtn" class="w-full rounded-lg bg-teal-700 hover:bg-teal-800 text-white text-sm font-semibold py-2.5">Login</button>
      </div>

      <div id="signupPanel" class="space-y-3 hidden">
        <div>
          <label class="text-xs text-slate-500">Full name</label>
          <input id="signupName" type="text" class="w-full mt-1 rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="Your name" />
        </div>
        <div>
          <label class="text-xs text-slate-500">Email</label>
          <input id="signupEmail" type="email" class="w-full mt-1 rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="you@example.com" />
        </div>
        <div>
          <label class="text-xs text-slate-500">Password</label>
          <input id="signupPassword" type="password" class="w-full mt-1 rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="••••••••" />
        </div>
        <button id="signupBtn" class="w-full rounded-lg bg-slate-900 hover:bg-slate-800 text-white text-sm font-semibold py-2.5">Create account</button>
      </div>

      <div class="my-4 flex items-center gap-3">
        <div class="h-px bg-slate-200 flex-1"></div>
        <span class="text-[11px] uppercase tracking-wider text-slate-500">or continue with</span>
        <div class="h-px bg-slate-200 flex-1"></div>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <button id="googleBtn" class="rounded-lg border border-slate-300 bg-white hover:bg-slate-50 text-sm font-semibold py-2.5">Google</button>
        <button id="githubBtn" class="rounded-lg border border-slate-300 bg-white hover:bg-slate-50 text-sm font-semibold py-2.5">GitHub</button>
      </div>

      <p class="mt-3 text-xs text-slate-500">Google/GitHub login uses Supabase config from backend environment.</p>

      <div id="authMessage" class="mt-4 text-sm text-slate-600"></div>
    </section>
  </div>

  <script>
    lucide.createIcons();

    const params = new URLSearchParams(window.location.search);
    const nextPath = params.get('next') || '/ui-prototype';

    const tabLogin = document.getElementById('tabLogin');
    const tabSignup = document.getElementById('tabSignup');
    const loginPanel = document.getElementById('loginPanel');
    const signupPanel = document.getElementById('signupPanel');
    const authMessage = document.getElementById('authMessage');

    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');

    const signupName = document.getElementById('signupName');
    const signupEmail = document.getElementById('signupEmail');
    const signupPassword = document.getElementById('signupPassword');
    const signupBtn = document.getElementById('signupBtn');
    const googleBtn = document.getElementById('googleBtn');
    const githubBtn = document.getElementById('githubBtn');

    let SUPABASE_URL = '';
    let SUPABASE_ANON_KEY = '';

    let supabaseClient = null;

    async function loadSupabaseConfig() {
      try {
        const res = await fetch('/api/v1/auth/supabase/config');
        if (!res.ok) return;
        const data = await res.json();
        if (data.configured) {
          SUPABASE_URL = data.url || '';
          SUPABASE_ANON_KEY = data.anon_key || '';
        }
      } catch (err) {
        // keep empty values and fallback to legacy auth endpoints
      }
    }

    function getSupabaseClient() {
      if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
        return null;
      }
      if (!supabaseClient) {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
      return supabaseClient;
    }

    async function exchangeSupabaseToken(accessToken) {
      const res = await fetch('/api/v1/auth/supabase/exchange', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ access_token: accessToken })
      });

      if (!res.ok) {
        const txt = await res.text();
        throw new Error(txt || 'Supabase exchange failed');
      }

      const data = await res.json();
      localStorage.setItem('agentic_token', data.access_token || '');
      window.location.href = nextPath;
    }

    async function handleSupabaseSessionIfPresent() {
      const client = getSupabaseClient();
      if (!client) return;

      try {
        const { data, error } = await client.auth.getSession();
        if (error) return;
        const accessToken = data?.session?.access_token;
        if (accessToken) {
          authMessage.textContent = 'Completing sign in...';
          authMessage.className = 'mt-4 text-sm text-slate-600';
          await exchangeSupabaseToken(accessToken);
        }
      } catch (err) {
        // ignore and let user continue manually
      }
    }

    function showLoginTab() {
      loginPanel.classList.remove('hidden');
      signupPanel.classList.add('hidden');
      tabLogin.className = 'px-3 py-2 rounded-lg text-sm font-semibold bg-slate-900 text-white';
      tabSignup.className = 'px-3 py-2 rounded-lg text-sm font-semibold bg-slate-100 text-slate-700';
      authMessage.textContent = '';
    }

    function showSignupTab() {
      signupPanel.classList.remove('hidden');
      loginPanel.classList.add('hidden');
      tabSignup.className = 'px-3 py-2 rounded-lg text-sm font-semibold bg-slate-900 text-white';
      tabLogin.className = 'px-3 py-2 rounded-lg text-sm font-semibold bg-slate-100 text-slate-700';
      authMessage.textContent = '';
    }

    tabLogin.addEventListener('click', showLoginTab);
    tabSignup.addEventListener('click', showSignupTab);

    loginBtn.addEventListener('click', async () => {
      const username = (loginEmail.value || '').trim();
      const password = loginPassword.value || '';
      if (!username || !password) {
        authMessage.textContent = 'Please enter email and password.';
        authMessage.className = 'mt-4 text-sm text-orange-600';
        return;
      }

      authMessage.textContent = 'Signing in...';
      authMessage.className = 'mt-4 text-sm text-slate-600';

      try {
        const client = getSupabaseClient();
        if (client) {
          const { data, error } = await client.auth.signInWithPassword({
            email: username,
            password,
          });
          if (error || !data?.session?.access_token) {
            throw new Error(error?.message || 'Login failed');
          }
          await exchangeSupabaseToken(data.session.access_token);
          return;
        }

        const body = new URLSearchParams();
        body.append('username', username);
        body.append('password', password);

        const res = await fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body
        });

        if (!res.ok) {
          const txt = await res.text();
          throw new Error(txt || 'Login failed');
        }

        const data = await res.json();
        localStorage.setItem('agentic_token', data.access_token || '');
        window.location.href = nextPath;
      } catch (err) {
        authMessage.textContent = 'Login failed. Check your credentials.';
        authMessage.className = 'mt-4 text-sm text-rose-600';
      }
    });

    signupBtn.addEventListener('click', async () => {
      const full_name = (signupName.value || '').trim();
      const email = (signupEmail.value || '').trim();
      const password = signupPassword.value || '';

      if (!email || !password) {
        authMessage.textContent = 'Email and password are required.';
        authMessage.className = 'mt-4 text-sm text-orange-600';
        return;
      }

      authMessage.textContent = 'Creating account...';
      authMessage.className = 'mt-4 text-sm text-slate-600';

      try {
        const client = getSupabaseClient();
        if (client) {
          const { data, error } = await client.auth.signUp({
            email,
            password,
            options: {
              data: {
                full_name,
              },
            },
          });

          if (error) {
            throw new Error(error.message || 'Sign up failed');
          }

          const accessToken = data?.session?.access_token;
          if (accessToken) {
            await exchangeSupabaseToken(accessToken);
            return;
          }

          authMessage.textContent = 'Account created. Please confirm email, then login.';
          authMessage.className = 'mt-4 text-sm text-emerald-700';
          showLoginTab();
          return;
        }

        const res = await fetch('/api/v1/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, full_name })
        });

        if (!res.ok) {
          const txt = await res.text();
          throw new Error(txt || 'Sign up failed');
        }

        const data = await res.json();
        localStorage.setItem('agentic_token', data.access_token || '');
        window.location.href = nextPath;
      } catch (err) {
        authMessage.textContent = 'Sign up failed. Email may already be registered.';
        authMessage.className = 'mt-4 text-sm text-rose-600';
      }
    });

    googleBtn.addEventListener('click', async () => {
      const client = getSupabaseClient();
      if (!client) {
        authMessage.textContent = 'Supabase is not configured yet. Add SUPABASE_URL and SUPABASE_ANON_KEY first.';
        authMessage.className = 'mt-4 text-sm text-orange-600';
        return;
      }

      authMessage.textContent = 'Redirecting to Google...';
      authMessage.className = 'mt-4 text-sm text-slate-600';
      const redirectTo = `${window.location.origin}/ui-auth?next=${encodeURIComponent(nextPath)}`;
      await client.auth.signInWithOAuth({ provider: 'google', options: { redirectTo } });
    });

    githubBtn.addEventListener('click', async () => {
      const client = getSupabaseClient();
      if (!client) {
        authMessage.textContent = 'Supabase is not configured yet. Add SUPABASE_URL and SUPABASE_ANON_KEY first.';
        authMessage.className = 'mt-4 text-sm text-orange-600';
        return;
      }

      authMessage.textContent = 'Redirecting to GitHub...';
      authMessage.className = 'mt-4 text-sm text-slate-600';
      const redirectTo = `${window.location.origin}/ui-auth?next=${encodeURIComponent(nextPath)}`;
      await client.auth.signInWithOAuth({ provider: 'github', options: { redirectTo } });
    });

    (async () => {
      await loadSupabaseConfig();
      await handleSupabaseSessionIfPresent();
    })();
  </script>
</body>
</html>
